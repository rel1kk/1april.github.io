<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VPN Import</title>
  <meta name="theme-color" content="#0f172a" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 580px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 { margin: 0 0 10px; font-size: 28px; }
    p { color: rgba(255,255,255,0.82); font-size: 14px; }

    input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 14px;
      margin-bottom: 14px;
    }

    .row { display: grid; gap: 12px; margin-bottom: 12px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }

    .primary { background: white; color: black; }
    .secondary { background: rgba(255,255,255,0.12); color: white; }
    .ghost { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }

    .status {
      margin-top: 12px;
      font-size: 14px;
      min-height: 40px;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
    }

    .qr-wrap { display: none; text-align: center; margin-top: 15px; }

    @media(max-width:560px){
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>VPN Import</h1>
    <p>Импорт через RAW без sub.txt</p>

    <input id="subInput" readonly />

    <div class="row grid-2">
      <button class="secondary" id="copyBtn">📋 Скопировать</button>
      <button class="secondary" id="openBtn">🌐 Открыть</button>
    </div>

    <div class="row grid-2">
      <button class="primary" id="v2Btn">V2rayTun</button>
      <button class="primary" id="happBtn">HApp</button>
    </div>

    <div class="row grid-2">
      <button class="ghost" id="clashBtn">Clash</button>
      <button class="ghost" id="shadowBtn">Shadowrocket</button>
    </div>

    <div class="status" id="status">Готово</div>

    <div class="qr-wrap" id="qrWrap">
      <canvas id="qrcode"></canvas>
    </div>
  </div>

<script>
const SUB_URL = "https://raw.githubusercontent.com/rel1kk/fluxru/main/vpn";

const APPS = {
  v2raytun: ["v2raytun://install-sub?url={url}","v2raytun://import?url={url}"],
  happ: ["happ://install-sub?url={url}","happ://import?url={url}"],
  clash: ["clash://install-config?url={url}"],
  shadowrocket: ["shadowrocket://install?url={url}"]
};

const statusEl = document.getElementById("status");

function setStatus(t){statusEl.textContent=t;}

async function copy(){
  try{
    await navigator.clipboard.writeText(SUB_URL);
    setStatus("Скопировано");
  }catch{
    prompt("Копируй:",SUB_URL);
  }
}

function openRaw(){
  window.open(SUB_URL,"_blank");
}

function build(app){
  const enc=encodeURIComponent(SUB_URL);
  return APPS[app].map(x=>x.replace("{url}",enc));
}

async function run(app){
  await copy();
  setStatus("Открываю "+app);

  const links=build(app);
  let i=0;

  function next(){
    if(i>=links.length){
      setStatus("Если ошибка — вставь ссылку вручную");
      return;
    }
    const l=links[i++];
    window.location.href=l;
    setTimeout(next,1000);
  }
  next();
}

document.getElementById("subInput").value=SUB_URL;

document.getElementById("copyBtn").onclick=copy;
document.getElementById("openBtn").onclick=openRaw;

document.getElementById("v2Btn").onclick=()=>run("v2raytun");
document.getElementById("happBtn").onclick=()=>run("happ");
document.getElementById("clashBtn").onclick=()=>run("clash");
document.getElementById("shadowBtn").onclick=()=>run("shadowrocket");
</script>

</body>
</html>
