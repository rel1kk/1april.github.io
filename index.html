<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>FluxNet</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { background: #050505; color: white; font-family: Arial, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { text-align: center; } /* MAIN GLITCH TEXT */ .glitch { font-size: 36px; position: relative; font-weight: bold; letter-spacing: 1px; animation: flicker 2s infinite; } .glitch::before, .glitch::after { content: "Шутка! Мы не закрываемся!!"; position: absolute; left: 0; width: 100%; overflow: hidden; } .glitch::before { color: #ff00c8; animation: glitchTop 0.8s infinite linear alternate-reverse; } .glitch::after { color: #00fff9; animation: glitchBottom 0.8s infinite linear alternate-reverse; } @keyframes glitchTop { 0% { transform: translate(0); clip-path: inset(0 0 80% 0); } 20% { transform: translate(-3px, -3px); } 40% { transform: translate(3px, 3px); clip-path: inset(0 0 20% 0); } 60% { transform: translate(-2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } } @keyframes glitchBottom { 0% { transform: translate(0); clip-path: inset(80% 0 0 0); } 20% { transform: translate(3px, 3px); } 40% { transform: translate(-3px, -3px); clip-path: inset(20% 0 0 0); } 60% { transform: translate(2px, -2px); } 80% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } } @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } } .subtitle { margin-top: 20px; color: #aaa; font-size: 18px; } .brand { margin-top: 50px; font-size: 14px; letter-spacing: 6px; color: #666; } </style> </head> <body> <div class="container"> <div class="glitch">Шутка! Мы не закрываемся!!</div> <div class="subtitle"> С 1 апреля. </div> <div class="brand"> FluxNet </div> </div> </body> </html>
